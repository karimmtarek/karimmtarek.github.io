beyond_client_work:
  section_label: "Beyond Client Work"
  section_title: "A published app and a viral campaign"
  section_description: "A published app I built on my own, and a campaign project worth mentioning."
  projects:
    - name: "FieldsRaven"
      subtitle: "My Own Shopify App - Live on the Shopify App Store"
      category: "Own product"
      body: "FieldsRaven extends Shopify's Metafields API to the storefront through an app proxy, enabling merchants to collect data on the fly and personalize their theme - functionality Shopify doesn't expose natively. Built with Ruby on Rails, I handle the full lifecycle: ideation, architecture, development, deployment, App Store review, and merchant support. Having a live app gives me platform depth that's hard to get from client work alone - I understand the API constraints, the review process, and how merchants actually use extended functionality in the real world."
      tags:
        - "Ruby on Rails"
        - "Shopify App Store"
        - "Metafields API"
        - "App Proxy"
        - "Full Product Lifecycle"

    - name: "Keurig Rivo Launch Campaign"
      subtitle: "Contest Web App - Built at Le Site (E-commerce Agency, Montreal)"
      category: "Campaign build"
      body: "For the Canadian launch of the Keurig Rivo espresso machine, I worked on a contest web app at Le Site, an e-commerce agency in Montreal. The app was delivered in 3-4 weeks from brief to launch, attracted hundreds of thousands of visitors, and generated over 30,000 social shares. I also automated the campaign's email build process, cutting production time from 8 hours to 2 hours using Middleman and the Google Docs API. This predates my Shopify focus, but it shows I can work on high-traffic, time-sensitive projects with tight deadlines."
      tags:
        - "Web Application"
        - "High Traffic"
        - "30K+ Social Shares"
        - "3-4 Week Turnaround"
        - "Process Automation"

how_i_help:
  section_label: "How I Help"
  section_title: "Ongoing Shopify Plus support without the agency layers"
  body: "I spent nearly 3 years working on custom Shopify Plus storefronts at PIVOT, a Shopify Plus Agency Partner. Now I work directly with brands and agencies. I'm available for ongoing retainers, project-based work, or a mix of both, and I usually work on retainer so I can learn your theme, your integrations, and the edge cases that tend to show up at the worst times."
  checklist:
    - "Ongoing backlog work, bug fixes, and theme cleanup"
    - "PDP and cart work: configurators, bundles, subscriptions, sticky ATCs, and size charts"
    - "Third-party integrations: Klaviyo, Yotpo, Rebuy, Klevu, Elevar, and Affirm"
    - "Landing pages, seasonal campaigns, and launch support"
    - "Structured data, SEO hygiene, and site speed improvements"




projects:
  section_label: "Shopify Plus Projects"
  section_title: "Storefronts built to convert, not just look good"
  section_description: "Custom Shopify Plus builds for real brands with real complexity - product configurators, third-party integrations, and pages that actually perform."
  list:
    - name: "Timbuk2"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "BAGS & ACCESSORIES"
      body: "Timbuk2 is an iconic bag brand with a loyal customer base and a complex product catalog that demanded more than an off-the-shelf theme. At PIVOT, I built and contributed to a fully custom Shopify Plus storefront tailored to their brand experience and performance standards. The work included custom Liquid templates, pixel-perfect responsive implementation, and front-end features supporting their product configurator and conversion goals. I also implemented structured data schemas and integrated their full marketing and analytics stack."
      tags:
        - "Custom Liquid Theme"
        - "Klevu Search"
        - "Elevar Analytics"
        - "Structured Data"
        - "Help Center"
        - "142 Commits"

    - name: "UrbanStems"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "GIFTING & SUBSCRIPTIONS"
      body: "UrbanStems is a modern flower and gifting brand with subscription complexity, seasonal campaigns, and a customer experience that needs to feel premium at every touchpoint. At PIVOT, I built custom product tile systems for their PLP, integrated and styled Yotpo review widgets across the PDP, implemented structured data for SEO (Organization, Product, Article schemas), and developed landing pages for their rewards, referral, and corporate gifting programs. I also built subscription landing page templates and handled video integration for hero sections."
      tags:
        - "Yotpo Reviews"
        - "Structured Data"
        - "Subscription LPs"
        - "Rewards & Referral Pages"
        - "Corporate Gifting Template"
        - "95 Commits"

    - name: "X-Chair"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "FURNITURE & ERGONOMICS"
      body: "X-Chair sells premium ergonomic chairs with a product configurator that lets customers build custom combinations - one of the more complex PDP experiences in Shopify Plus. At PIVOT, I was deeply embedded in this project with 328 commits over 18 months. I styled the homepage to match the X-Chair design system, injected Affirm buy-now-pay-later messaging across PDP, cart, and PLP, integrated Klevu for collection search and filtering, implemented Yotpo for reviews and UGC, set up Elevar scripts for checkout tracking, and built corporate pages, help centers, store locators, and warranty forms from scratch."
      tags:
        - "Product Configurator"
        - "Affirm BNPL"
        - "Klevu Search"
        - "Yotpo Reviews & UGC"
        - "Elevar"
        - "Salesforce"
        - "328 Commits"

    - name: "Celluma"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "HEALTH & WELLNESS"
      body: "Celluma makes FDA-cleared LED light therapy devices - a product that requires a content-heavy storefront with educational pages, before-and-after results, and a professional vs. consumer audience split. At PIVOT, I contributed 209 commits building content page templates, blog filtering with author views, Rebuy cart integration for free gift logic and variant backorder messaging, Klaviyo modal and form integrations with GA event tracking, and extensive accessibility improvements including focus traps, alt attributes, and translations. I also built theme settings to scope changes between their US and international stores."
      tags:
        - "Rebuy Smart Cart"
        - "Klaviyo Forms & Modals"
        - "GA Event Tracking"
        - "Accessibility"
        - "Multi-store Settings"
        - "209 Commits"

    - name: "Vuori"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "ATHLEISURE & APPAREL"
      body: "Vuori is one of the fastest-growing athleisure brands in the US, known for a brand experience that's as polished as their product. At PIVOT, I built the Dreamknit collection template with a custom hero banner system, developed alternate states for their lifestyle image components across 33 files, created their careers page template, and built a size chart system for the Clae shoe collaboration. I also implemented a system to make Dreamknit-specific assets available across any page template with a Dreamknit suffix - the kind of brand-specific architecture that keeps content teams moving without developer bottlenecks."
      tags:
        - "Dreamknit Templates"
        - "Lifestyle Image Components"
        - "Size Chart System"
        - "Dynamic Asset Loading"
        - "Careers Template"
        - "59 Commits"


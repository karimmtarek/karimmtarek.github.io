about:
  section_label: "About"
  section_title: "A bit more context"
  paragraphs:
    - "I'm Karim, a fullstack Shopify developer based in Victoria, BC. I've been building for the web for over 17 years, with the last 9 focused on Shopify. Most recently I spent nearly 3 years as a Senior Frontend Developer at PIVOT, a Shopify Plus Agency Partner, where I shipped custom storefronts for 20+ enterprise DTC brands."
    - "I've also built and published FieldsRaven, a Shopify app on the App Store that extends the Metafields API - so I understand the platform from the app side too, not just the theme side."
    - "Before Shopify, I worked at the ALDO Group, built a viral web app for Keurig's Canadian launch, and spent time at Doctors Without Borders managing their UAE web presence. I hold a B.Sc. in Computer Engineering and a Project Management certificate from McGill."
    - "I work best on a part-time or retainer basis - consistent enough to understand your brand deeply, flexible enough to not be overhead you don't need. I'm remote-first and have been for years."


beyond_client_work:
  section_label: "Beyond Client Work"
  section_title: "A published app and a viral campaign"
  section_description: "Not everything I build is for a client. These show what I do when I'm the one making the decisions."
  projects:
    - name: "FieldsRaven"
      subtitle: "My Own Shopify App - Live on the Shopify App Store"
      category: "OWN PRODUCT"
      body: "Most Shopify developers customize themes. I built and shipped a product. FieldsRaven extends Shopify's Metafields API to the storefront through an app proxy, enabling merchants to collect data on the fly and personalize their theme - functionality Shopify doesn't expose natively. Built with Ruby on Rails, I handle the full lifecycle: ideation, architecture, development, deployment, App Store review, and merchant support. Having a live app gives me platform depth that's hard to get from client work alone - I understand the API constraints, the review process, and how merchants actually use extended functionality in the real world."
      tags:
        - "Ruby on Rails"
        - "Shopify App Store"
        - "Metafields API"
        - "App Proxy"
        - "Full Product Lifecycle"

    - name: "Keurig Rivo Launch Campaign"
      subtitle: "Contest Web App - Built at Le Site (E-commerce Agency, Montreal)"
      category: "CAMPAIGN BUILD"
      body: "For the Canadian launch of the Keurig Rivo espresso machine, I built a contest web app at Le Site, an e-commerce agency in Montreal. Delivered in 3-4 weeks from brief to launch, the app attracted hundreds of thousands of visitors and generated over 30,000 social shares. I also automated the campaign's email build process, cutting production time from 8 hours to 2 hours using Middleman and the Google Docs API. This predates my Shopify focus, but it shows I can build high-traffic, time-sensitive products end to end - exactly the muscle that matters for seasonal launches and campaign-driven brands."
      tags:
        - "Web Application"
        - "High Traffic"
        - "30K+ Social Shares"
        - "3-4 Week Turnaround"
        - "Process Automation"


    - "Before Shopify, I worked at the ALDO Group, worked on a high-traffic web app for Keurig's Canadian launch, and spent time at Doctors Without Borders managing their UAE web presence. I hold a B.Sc. in Computer Engineering and a Project Management certificate from McGill."
    - "I work best on a part-time or retainer basis, consistent enough to understand your brand, flexible enough to not be overhead you don't need. I'm remote-first and have been for years. I take pride in the work and I'm in it for the long game. Good work leads to repeat business, and that's exactly how I want to grow."

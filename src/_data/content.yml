  section_label: "What People Say"
  section_title: "From the people I've worked with"
  quotes:
    - name: "Mary-Kevin Stuart"
      role: "Entrepreneur - Shopify Store Owner"
      quote: "I recently launched my Shopify store and I hired Karim to help with the development of the site. Karim did an amazing job with all of the projects I gave him and he exceeded all of my expectations. I was particularly impressed with Karim's communication, timeliness, receptivity to feedback, and attention to detail. He was very open to change and communicative about creative approaches we could take and the potential impact to the original estimate. I wholeheartedly recommend Karim."
      thumb: "mary-kevin.jpg"

    - name: "Jayme Thomson"
      role: "Shopify Store Owner"
      quote: "Twice I got told I would have to compromise on the changes I wanted for my website, until I contacted Karim. He implemented a challenging filter change to my delight. If there are more cost effective, efficient and better ways to do what you are trying to achieve he will tell you."
      thumb: "jayme.svg"

    - name: "Ericca Garrison"
      role: "Shopify Store Owner"
      quote: "Karim did an excellent job, he met and exceeded all expectations. He communicated clearly at each phase of the project."
      thumb: "ericca.jpg"

    - name: "James Corr"
      role: "Growth Consultant - Product & GTM Expert"
      quote: "Karim is a passionate developer that strives to better himself and improve his craft. He has helped OnlyGrowth with front-end development for Shopify sites. Karim is very responsive and communicates when he will be away or needs an extension. Unlike a lot of developers, Karim is also fairly good with estimating tasks and QA'ing his work prior to saying it is done."
      thumb: "james.jpg"

    - name: "Matt Magi"
      role: "Co-Founder, Voltage New Media"
      quote: "Karim worked with us as a contractor for ~2 years. I was always impressed with his punctuality, organization, problem solving and ability to think outside the box. He was never afraid to push back and make suggestions which would always benefit the projects we worked on together."
      thumb: "matt.jpg"

    - name: "Ysaël Pépin"
      role: "IT Development Manager, ALDO Group"
      quote: "Not only he would deliver quality work on time, but also made sure he was improving his source code while keeping it readable and maintainable. His eye for design and his constant curiosity was also very appreciated by our team."
      thumb: "ysael.jpg"



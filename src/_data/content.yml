projects:
  section_label: "Shopify Plus Projects"
  section_title: "Custom storefronts for brands with real complexity"
  section_description: "Custom Shopify Plus builds for real brands with real complexity - product configurators, third-party integrations, and pages that actually perform."
  section_description: "At PIVOT, I worked as part of small dev teams on custom Shopify Plus builds - third-party integrations, content templates, and ongoing feature work."
  list:
    - name: "Timbuk2"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "Bags & accessories"
      body: "Timbuk2 is an iconic bag brand with a loyal customer base and a complex product catalog. At PIVOT, I worked on their custom Shopify Plus storefront as part of a small dev team over 14 months. My contributions included custom Liquid templates, responsive front-end implementation, structured data schemas, and integration work across their marketing and analytics stack including Klevu search and Elevar tracking. I also worked on their help center, eco/sustainability pages, store locator, and corporate page system."
      tags:
        - "Custom Liquid Theme"
        - "Klevu Search"
        - "Elevar Analytics"
        - "Structured Data"
        - "Help Center"
        - "142 Commits"

    - name: "UrbanStems"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "Gifting & subscriptions"
      body: "UrbanStems is a modern flower and gifting brand with subscription complexity and seasonal campaigns. At PIVOT, I worked on their custom Shopify Plus storefront, contributing product tile systems for the PLP, Yotpo review widget integration and styling on the PDP, structured data implementation (Organization, Product, Article schemas), and landing pages for their rewards, referral, and corporate gifting programs. I also worked on subscription landing page templates and video integration for hero sections."
      tags:
        - "Yotpo Reviews"
        - "Structured Data"
        - "Subscription LPs"
        - "Rewards & Referral Pages"
        - "Corporate Gifting Template"
        - "95 Commits"

    - name: "X-Chair"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "Furniture & ergonomics"
      body: "X-Chair sells premium ergonomic chairs with a product configurator that lets customers build custom combinations - one of the more complex PDP experiences in Shopify Plus. At PIVOT, I was on this project for 18 months with 328 commits. My work included homepage styling to match the X-Chair design system, Affirm buy-now-pay-later messaging across PDP, cart, and PLP, Klevu integration for collection search and filtering, Yotpo for reviews and UGC, Elevar scripts for checkout tracking, and front-end builds for corporate pages, help centers, store locators, and warranty forms."
      tags:
        - "Product Configurator"
        - "Affirm BNPL"
        - "Klevu Search"
        - "Yotpo Reviews & UGC"
        - "Elevar"
        - "Salesforce"
        - "328 Commits"

    - name: "Celluma"
      subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
      category: "Health & wellness"
      body: "Celluma makes FDA-cleared LED light therapy devices - a product that requires a content-heavy storefront with educational pages and a professional vs. consumer audience split. At PIVOT, I contributed 209 commits over the course of this project. My work covered content page templates, blog filtering with author views, Rebuy cart integration for free gift logic and variant backorder messaging, Klaviyo modal and form integrations with GA event tracking, and accessibility improvements including focus traps, alt attributes, and translations. I also worked on theme settings to scope changes between their US and international stores."
      tags:
        - "Rebuy Smart Cart"
        - "Klaviyo Forms & Modals"
        - "GA Event Tracking"
        - "Accessibility"
        - "Multi-store Settings"
        - "209 Commits"

    # - name: "Vuori"
    #   subtitle: "Custom Shopify Plus Storefront - Built at PIVOT (Shopify Plus Agency Partner)"
    #   category: "ATHLEISURE & APPAREL"
    #   body: "Vuori is one of the fastest-growing athleisure brands in the US. At PIVOT, I contributed to their custom Shopify Plus storefront, working on the Dreamknit collection template with a custom hero banner system, alternate states for lifestyle image components, a careers page template, and a size chart system for the Clae shoe collaboration. I also implemented a system to make Dreamknit-specific assets available across any page template with a Dreamknit suffix, so the content team could extend the collection without needing a developer."

about:
  section_label: "About"
  section_title: "A bit more context"
  paragraphs:
    - "I'm Karim, a fullstack Shopify developer based in Victoria, BC. I've been building for the web for over 17 years, with the last 9 focused on Shopify. Most recently I spent nearly 3 years at PIVOT, a Shopify Plus Agency Partner, where I contributed to custom storefronts for 20+ DTC brands as part of small development teams."
